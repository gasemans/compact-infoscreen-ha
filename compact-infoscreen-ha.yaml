esphome:
  name: compact-infoscreen-ha
  friendly_name: Compact Infoscreen Home Assistent

  includes:
    - includes/colors.h
    - includes/layouts.h
    - includes/icons.h
    - includes/helpers.h
    - includes/gauge_lookup.h
    - includes/gauge_types.h
    - includes/gauge_math.h
    - includes/gauge_text.h
    - includes/gauge_ring_arc.h
    - includes/gauge_ring_ticks.h
    - includes/gauge_ring_shadow.h
    - includes/gauge_ring.h
    - includes/gauge.h
    - includes/battery_page.h
    - includes/clock_page.h
    - includes/weather_page.h
    - includes/salt_page.h
    - includes/pages.h

esp32:
  board: esp32dev
  framework:
    type: esp-idf
    advanced:
      loop_task_stack_size: 16000
      minimum_chip_revision: "3.1"
      sram1_as_iram: true

logger:

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome

web_server:
  version: 3

button:
  - platform: restart
    name: "Herstart"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

spi:
  clk_pin: GPIO18
  mosi_pin: GPIO17

font:
  - file: "gfonts://Roboto"
    id: font_sm
    size: 18
    extras: &icon_extras
      - file: "fonts/materialdesignicons-webfont.ttf"
        glyphs:
          - "\U000F0079"  # mdi:battery
          - "\U000F0150"  # mdi:clock-outline
          - "\U000F0590"  # mdi:weather-partly-cloudy / weather-cloudy
          - "\U000F0599"  # mdi:weather-sunny
          - "\U000F0F64"  # mdi:weather-night
          - "\U000F0595"  # mdi:weather-partly-cloudy
          - "\U000F0597"  # mdi:weather-rainy
          - "\U000F067E"  # mdi:weather-lightning-rainy
          - "\U000F0593"  # mdi:weather-lightning
          - "\U000F0598"  # mdi:weather-snowy
          - "\U000F0591"  # mdi:weather-fog
          - "\U000F059D"  # mdi:weather-windy
          - "\U000F0E73"  # mdi:shaker-outline
          - "\U000F058C"  # mdi:water
          - "\U000F012C"  # mdi:check
          - "\U000F0026"  # mdi:alert
          - "\U000F0159"  # mdi:close
  - file: "gfonts://Roboto"
    id: font_md
    size: 26
    extras: *icon_extras
  - file: "gfonts://Roboto"
    id: font_lg
    size: 40
    extras: *icon_extras
  - file: "gfonts://Roboto"
    id: font_xl
    size: 64
    extras: *icon_extras
  - file:
      type: gfonts
      family: Roboto
      weight: 700
    id: font_sm_bold
    size: 20

time:
  - platform: homeassistant
    id: ha_time

sensor:
  - platform: homeassistant
    id: battery1
    entity_id: sensor.gasebatterij_1_laadpercentage
  - platform: homeassistant
    id: battery2
    entity_id: sensor.plug_in_battery_laadpercentage
  - platform: homeassistant
    id: salt_level
    entity_id: sensor.zoutlevelsensor_salt_level_percentage
  - platform: homeassistant
    id: outdoor_temperature
    entity_id: weather.huis
    attribute: temperature
  - platform: homeassistant
    id: outdoor_humidity
    entity_id: weather.huis
    attribute: humidity
  - platform: homeassistant
    id: outdoor_wind_speed
    entity_id: weather.huis
    attribute: wind_speed
  - platform: homeassistant
    id: outdoor_wind_bearing
    entity_id: weather.huis
    attribute: wind_bearing

  # Alleen voor op de webpagina: laat zien welke van de 4 dashboards
  # er nu op het rondje-display staat, en het gemiddelde batterijpercentage.
  - platform: template
    name: "Batterij totaal"
    id: battery_total
    unit_of_measurement: "%"
    accuracy_decimals: 0
    update_interval: 10s
    lambda: |-
      return (id(battery1).state + id(battery2).state) / 2.0f;

text_sensor:
  - platform: homeassistant
    id: weather_state
    entity_id: weather.huis

  # Laat op de webpagina zien welke van de 4 dashboards nu actief is
  # op het ronde display.
  - platform: template
    name: "Huidige pagina"
    id: current_page_name
    update_interval: 1s
    lambda: |-
      switch (static_cast<ui::Page>(id(current_page))) {
        case ui::Page::BATTERY: return {"Batterij"};
        case ui::Page::CLOCK:   return {"Klok"};
        case ui::Page::WEATHER: return {"Weer"};
        case ui::Page::SALT:    return {"Zoutniveau"};
        default:                return {"Onbekend"};
      }

globals:
  - id: current_page
    type: int
    initial_value: "0"

interval:
  - interval: 10s
    then:
      - lambda: |-
          id(current_page)=(id(current_page)+1)%4;

display:
  - platform: mipi_spi
    model: GC9A01A
    cs_pin: GPIO15
    dc_pin: GPIO16
    reset_pin: GPIO14
    invert_colors: true
    dimensions:
      width: 240
      height: 240
    lambda: |-
      using namespace ui;
      draw_page(
        it,
        static_cast<Page>(id(current_page)),
        id(font_xl),
        id(font_lg),
        id(font_md),
        id(font_sm),
        id(font_sm_bold),
        id(battery1).state,
        id(battery2).state,
        id(salt_level).state,
        id(outdoor_temperature).state,
        id(outdoor_humidity).state,
        id(outdoor_wind_speed).state,
        id(outdoor_wind_bearing).state,
        id(weather_state).state.c_str(),
        id(ha_time).now()
      );
